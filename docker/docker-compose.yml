version: "3.9"

services:
  bff-service:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: bff-service
    ports:
      - "8080:8080"
    environment:
      EUREKA_SERVER_URL: http://host.docker.internal:8761/eureka
      EUREKA_ENABLED: "true"
      SERVER_PORT: 8080
    networks:
      - bff-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  bff-net:
    driver: bridge
